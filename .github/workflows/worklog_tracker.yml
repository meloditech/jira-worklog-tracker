name: Jira Worklog Tracker

on:
  schedule:
    # Weekdays at 06:45 UTC (off-peak, ~10 min delay → delivery ~8:55 CEST / ~7:55 CET)
    - cron: '45 6 * * 1-5'
    # Friday at 14:45 UTC (off-peak → delivery ~17:00 CEST / ~16:00 CET)
    - cron: '45 14 * * 5'
  workflow_dispatch:
    inputs:
      weekly_summary:
        description: 'Send weekly summary instead of daily check'
        type: boolean
        default: false

jobs:
  check-worklogs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%H)
            DAY=$(date -u +%u)
            if [ "$DAY" = "5" ] && [ "$HOUR" -ge "14" ]; then
              echo "weekly=true" >> $GITHUB_OUTPUT
            else
              echo "weekly=false" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ inputs.weekly_summary }}" = "true" ]; then
            echo "weekly=true" >> $GITHUB_OUTPUT
          else
            echo "weekly=false" >> $GITHUB_OUTPUT
          fi

      - name: Run daily worklog tracker
        if: steps.mode.outputs.weekly != 'true'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          USER_MAPPING: ${{ secrets.USER_MAPPING }}
          PROJECT_BLACKLIST: ${{ secrets.PROJECT_BLACKLIST }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python worklog_tracker.py

      - name: Run weekly summary
        if: steps.mode.outputs.weekly == 'true'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          USER_MAPPING: ${{ secrets.USER_MAPPING }}
          PROJECT_BLACKLIST: ${{ secrets.PROJECT_BLACKLIST }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python worklog_tracker.py --weekly-summary
