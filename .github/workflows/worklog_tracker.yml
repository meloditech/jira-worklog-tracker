name: Jira Worklog Tracker

# Scheduled runs moved to Render Cron Jobs (see README → Deployment).
# This workflow stays for manual dispatch (Actions → Run workflow).
on:
  workflow_dispatch:
    inputs:
      weekly_summary:
        description: 'Send weekly summary instead of daily check'
        type: boolean
        default: false

jobs:
  check-worklogs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ inputs.weekly_summary }}" = "true" ]; then
            echo "weekly=true" >> $GITHUB_OUTPUT
          else
            echo "weekly=false" >> $GITHUB_OUTPUT
          fi

      - name: Run daily worklog tracker
        if: steps.mode.outputs.weekly != 'true'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          USER_MAPPING: ${{ secrets.USER_MAPPING }}
          PROJECT_BLACKLIST: ${{ secrets.PROJECT_BLACKLIST }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python worklog_tracker.py

      - name: Run weekly summary
        if: steps.mode.outputs.weekly == 'true'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          USER_MAPPING: ${{ secrets.USER_MAPPING }}
          PROJECT_BLACKLIST: ${{ secrets.PROJECT_BLACKLIST }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python worklog_tracker.py --weekly-summary
